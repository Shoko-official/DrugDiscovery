[workspace]
resolver = "2"
members = ["crates/domain", "crates/desktop-core", "crates/viz", "apps/desktop/src-tauri"]

[workspace.package]
edition = "2024"
license = "Proprietary"
rust-version = "1.95"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
uuid = { version = "1", features = ["v7", "serde"] }

syntax = "proto3";
package bioworld.v2;

service DecisionService {
  rpc GetDecision(GetDecisionRequest) returns (DecisionRecord);
  rpc ProposeDecision(ProposeDecisionRequest) returns (DecisionRecord);
  rpc WatchDecision(WatchDecisionRequest) returns (stream DecisionEvent);
}

message GetDecisionRequest { string decision_id = 1; }
message ProposeDecisionRequest {
  string idempotency_key = 1;
  string cou_id = 2;
  string evidence_snapshot_id = 3;
  Recommendation recommendation = 4;
  repeated string rationale = 5;
}
message WatchDecisionRequest { string decision_id = 1; }
message EvidenceSnapshotRef {
  string id = 1;
  string sha256 = 2;
}
message DecisionRecord {
  string decision_id = 1;
  string cou_id = 2;
  string evidence_snapshot_id = 3 [deprecated = true];
  Recommendation recommendation = 4;
  repeated string rationale = 5;
  uint64 aggregate_version = 6;
  EvidenceSnapshotRef evidence = 7;
  optional OodStatus ood_status = 8;
}
message DecisionEvent { DecisionRecord decision = 1; string event_id = 2; }
enum Recommendation {
  RECOMMENDATION_UNSPECIFIED = 0;
  RECOMMENDATION_PROMOTE = 1;
  RECOMMENDATION_REJECT = 2;
  RECOMMENDATION_ABSTAIN = 3;
  RECOMMENDATION_DEFER = 4;
  RECOMMENDATION_STOP_PROGRAM = 5;
}
enum OodStatus {
  OOD_STATUS_UNSPECIFIED = 0;
  OOD_STATUS_IN_DOMAIN = 1;
  OOD_STATUS_BORDERLINE = 2;
  OOD_STATUS_OUT_OF_DOMAIN = 3;
  OOD_STATUS_UNKNOWN = 4;
}
